<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Food Logger</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<header>
  <span>Campus Food Logger</span>
  <button id="btn-settings" title="Settings">&#9881;</button>
</header>

<div class="section settings-panel" id="settings-panel" style="display:none">
  <div class="section-title">&#9881; Settings</div>
  <div class="diary-toggle">
    <label class="toggle-label">
      <input type="checkbox" id="college-mode-checkbox" />
      College Mode (Dining Hall API)
    </label>
  </div>
</div>

<div class="section" id="dining-section" style="display:none">
  <div class="section-title">Dining Hall</div>
  <div class="dining-row">
    <label class="source-label">School</label>
    <select id="school-select" class="meal-select">
      <option value="">Loading...</option>
    </select>
  </div>
  <div class="dining-row">
    <label class="source-label">Hall</label>
    <select id="hall-select" class="meal-select">
      <option value="">—</option>
    </select>
  </div>
  <div class="dining-row">
    <label class="source-label">Meal</label>
    <select id="meal-select-dining" class="meal-select">
      <option value="breakfast">Breakfast</option>
      <option value="lunch" selected>Lunch</option>
      <option value="dinner">Dinner</option>
      <option value="everyday">All Day</option>
    </select>
  </div>
  <button class="btn-primary" id="btn-fetch-menu" style="width:100%;margin-top:8px">Fetch Menu</button>
</div>

<div class="section">
  <div class="section-title">Import Foods</div>
  <div class="row">
    <button class="btn-secondary" id="btn-template">Download Template</button>
    <button class="btn-primary" id="btn-import" style="flex:1">Import CSV</button>
    <input type="file" id="csv-input" accept=".csv" />
  </div>
</div>

<div class="section">
  <div class="section-title">Foods to Upload</div>

  <div class="source-row">
    <label class="source-label" for="source-input">Source</label>
    <input type="text" id="source-input" class="source-input" value="Dining Hall" placeholder="e.g. Dining Hall" autocomplete="off" />
  </div>

  <div class="toggle-row">
    <label class="toggle-label">
      <input type="checkbox" id="public-checkbox" />
      Make public
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="diary-checkbox" />
      Log to diary
    </label>
  </div>

  <div id="meal-row" style="display:none">
    <select class="meal-select" id="meal-select">
      <option value="">Loading meals...</option>
    </select>
  </div>

  <div id="select-controls" style="display:none">
    <button id="btn-select-all">Select All</button>
    <button id="btn-deselect-all">Deselect All</button>
  </div>

  <div id="food-list">
    <div class="empty-state">Import a CSV or fetch from Dining Hall to see foods here.</div>
  </div>
</div>

<div class="section">
  <button class="btn-primary" id="btn-log" style="width:100%" disabled>Upload Selected Foods to MFP</button>
</div>

<div id="status">Ready. Import a CSV to get started.</div>

<script src="popup.js"></script>
</body>
</html>
